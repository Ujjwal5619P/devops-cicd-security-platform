name: CD Pipeline

on:
  push:
    branches:
      - production

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deployment Step
      run: echo "Deploying application..."

    - name: Generate Deployment Report
      run: |
        mkdir -p artifacts
        echo "Deployment successful" > artifacts/deploy-report.txt

    - name: Rollback Mechanism
      if: failure()
      run: echo "Rollback triggered..."